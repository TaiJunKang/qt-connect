<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Background -->
  <rect width="200" height="200" rx="40" fill="#1a1f2e"/>

  <!-- Gold cross (subtle, between H and C) -->
